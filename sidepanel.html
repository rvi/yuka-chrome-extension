<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yuka Scanner</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Login Screen -->
  <div id="login-screen" class="screen">
    <div class="login-container">
      <div class="logo-area">
        <div class="logo-icon">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <circle cx="24" cy="24" r="24" fill="#3CC77A"/>
            <path d="M14 20L22 32L34 14" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h1>Yuka Scanner</h1>
        <p class="subtitle">Scan products on any page and get health scores</p>
      </div>

      <div class="form-group">
        <label for="token-input">Authentication Token</label>
        <textarea
          id="token-input"
          placeholder="Paste your Yuka/Firebase token here..."
          rows="4"
        ></textarea>
        <p class="hint">Your token from the Yuka app. This is stored locally and used to authenticate API requests.</p>
      </div>

      <button id="login-btn" class="btn-primary">
        <span class="btn-text">Connect</span>
        <span class="btn-loading hidden">
          <span class="spinner"></span> Connecting...
        </span>
      </button>

      <div id="login-error" class="error-message hidden"></div>
    </div>
  </div>

  <!-- Main Scanner Screen -->
  <div id="main-screen" class="screen hidden">
    <header>
      <div class="header-left">
        <div class="header-logo">
          <svg width="24" height="24" viewBox="0 0 48 48" fill="none">
            <circle cx="24" cy="24" r="24" fill="#3CC77A"/>
            <path d="M14 20L22 32L34 14" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h2>Yuka Scanner</h2>
      </div>
      <button id="logout-btn" class="btn-icon" title="Logout">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </header>

    <div class="controls">
      <button id="scan-btn" class="btn-primary btn-scan">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 4V1h3"/><path d="M20 1h3v3"/><path d="M23 20v3h-3"/><path d="M4 23H1v-3"/>
          <line x1="1" y1="12" x2="23" y2="12"/>
        </svg>
        <span>Scan This Page</span>
      </button>

      <div class="search-box">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input id="manual-search" type="text" placeholder="Search a product manually..." />
        <button id="search-btn" class="btn-icon-sm" title="Search">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>
      </div>
    </div>

    <div id="status-bar" class="status-bar hidden">
      <span class="spinner-sm"></span>
      <span id="status-text">Scanning...</span>
    </div>

    <div id="results-area" class="results-area">
      <div id="empty-state" class="empty-state">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5">
          <path d="M1 4V1h3"/><path d="M20 1h3v3"/><path d="M23 20v3h-3"/><path d="M4 23H1v-3"/>
          <circle cx="12" cy="12" r="4"/>
        </svg>
        <p>Click <strong>Scan This Page</strong> to detect products or search manually above.</p>
      </div>

      <div id="products-list" class="products-list hidden"></div>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
